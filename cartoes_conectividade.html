<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Impressão Corrigida (8x5cm) - Cartões Gil Eventos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --gold-light: #FFF5D0;
            --gold-main: #FFAE00;
            --gold-dark: #B8860B;
            --dark-bg: #050505;
            --card-w: 8.0cm;
            --card-h: 5.0cm;
        }

        body { 
            margin: 0; 
            padding: 0; 
            background: #222; 
            font-family: 'Poppins', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        .no-print-bar {
            background: #111;
            padding: 15px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            position: sticky;
            top: 0;
            z-index: 999;
        }
        .btn-print {
            background: linear-gradient(45deg, var(--gold-main), #FFD580);
            color: #000;
            border: none;
            padding: 10px 35px;
            font-size: 1em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 174, 0, 0.4);
            text-transform: uppercase;
        }

        .print-section-title {
            color: #fff;
            margin: 25px 0 8px 0;
            text-transform: uppercase;
            font-size: 1.1em;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .folha-a4 {
            width: 21cm;
            height: 29.7cm;
            background: #fff;
            box-sizing: border-box;
            padding: 1.2cm 1.0cm;
            display: grid;
            grid-template-columns: repeat(2, var(--card-w));
            grid-template-rows: repeat(5, var(--card-h));
            gap: 0.5cm 1.0cm;
            justify-content: center;
            align-content: center;
            page-break-after: always;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        .cartao-box {
            width: var(--card-w);
            height: var(--card-h);
            background: var(--dark-bg);
            border-radius: 8px;
            box-sizing: border-box;
            border: 1px solid #222;
            position: relative;
            overflow: hidden;
            display: flex;
        }

        /* FRENTE INDEPENDENTE (MANTIDA 100% IGUAL) */
        .frente-layout {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            position: relative;
        }
        .drink-furia {
            width: 45%;
            height: 100%;
            background-image: url('https://i.pinimg.com/736x/68/4b/63/684b638accaa4a1e83ed8c62ab81ca88.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .drink-furia::after {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0; width: 45%;
            background: linear-gradient(to right, transparent, var(--dark-bg));
        }
        .frente-text-side {
            width: 55%;
            padding: 25px 10px 10px 5px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: left;
            z-index: 2;
        }
        .frente-location {
            position: absolute;
            top: 10px;
            right: 12px;
            font-size: 0.48em;
            color: #aaa;
            background: #111;
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid #222;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .frente-title {
            font-size: 0.85em;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            line-height: 1.2;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }
        .frente-subtitle {
            font-size: 0.52em;
            color: #ddd;
            line-height: 1.3;
            font-weight: 400;
        }
        .frente-subtitle strong {
            color: var(--gold-main);
            font-weight: 700;
        }

        /* VERSO: NOVA ARQUITETURA PREMIUM CENTRALIZADA */
        .verso-layout {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            box-sizing: border-box;
            background: radial-gradient(circle at 50% 50%, rgba(255,174,0,0.03) 0%, transparent 70%), #050505;
        }
        
        .verso-title-top {
            font-size: 0.58em;
            color: #fff;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
            text-align: center;
            border-bottom: 1px solid #151515;
            width: 100%;
            padding-bottom: 4px;
        }

        /* Linha Central: QR Esquerda | Aperol Meio | QR Direita */
        .verso-center-row {
            display: flex;
            width: 100%;
            justify-content: space-between;
            align-items: center;
            margin: 4px 0;
        }

        .qr-block-side {
            width: 32%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .qr-container {
            background: #fff;
            padding: 3px;
            border-radius: 4px;
            border: 1.2px solid var(--gold-main);
            display: inline-block;
            line-height: 0;
        }

        .qr-label {
            color: #aaa;
            font-size: 0.4em;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            font-weight: 600;
            text-align: center;
            line-height: 1.2;
        }
        .qr-label span {
            color: var(--gold-main);
            display: block;
            font-weight: 700;
        }

        /* Selo Central do Drink Aperol */
        .drink-center-seal {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background-image: url('https://i.pinimg.com/736x/ab/84/c4/ab84c45b7367fc9b08f51509fa661848.jpg');
            background-size: cover;
            background-position: center;
            border: 1.5px solid var(--gold-main);
            box-shadow: 0 0 10px rgba(255, 174, 0, 0.15);
        }

        /* Rodapé de Linha Única Perfeita */
        .footer-contact-flat {
            font-size: 0.52em;
            color: #fff;
            text-align: center;
            font-weight: 400;
            letter-spacing: 0.3px;
            width: 100%;
            border-top: 1px solid #151515;
            padding-top: 5px;
            white-space: nowrap; /* Impede a quebra de linha de vez */
        }
        .footer-contact-flat span {
            color: var(--gold-main);
            font-weight: 700;
        }

        @media print {
            @page {
                size: A4 portrait;
                margin: 0;
            }
            body { background: #fff; }
            .no-print-bar, .print-section-title { display: none; }
            .folha-a4 {
                margin: 0;
                box-shadow: none;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>

    <div class="no-print-bar">
        <button class="btn-print" onclick="window.print()">🖨️ Imprimir Cartões (Frente e Verso)</button>
    </div>

    <div class="print-section-title">FOLHA 1: FRENTE (Imprimir primeiro)</div>
    <div class="folha-a4" id="paginaFrente"></div>

    <div class="print-section-title">FOLHA 2: VERSO (Virar o papel e imprimir atrás)</div>
    <div class="folha-a4" id="paginaVerso"></div>

    <script>
        const INSTA_URL = "https://www.instagram.com/_gil.vibe?igsh=YW5vYmtnbmR6NHBy";
        const APP_URL = "https://gileventosfsa-gif.github.io/app-gil-eventos/index.html";
        const TOTAL_CARTOES = 10;
        
        const containerFrente = document.getElementById("paginaFrente");
        const containerVerso = document.getElementById("paginaVerso");

        // Gerador das Frentes Otimizado (Gil Eventos + Destaques Fortes)
        for (let i = 1; i <= TOTAL_CARTOES; i++) {
            containerFrente.innerHTML += `
                <div class="cartao-box">
                    <div class="frente-layout">
                        <div class="drink-furia"></div>
                        <div class="frente-text-side">
                            <span class="frente-location">FEIRA | SSA</span>
                            <div class="frente-title">Gil Eventos 🍹</div>
                            <div class="frente-subtitle">Surpreenda seus convidados com uma <strong>experiência inesquecível</strong> de coquetelaria premium.</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Gerador dos Versos (Aperol na Esquerda + Informações Centrais + Uva na Direita)
        for (let i = 1; i <= TOTAL_CARTOES; i++) {
            const qrInstaId = `qr-insta-${i}`;
            const qrAppId = `qr-app-${i}`;
            
            containerVerso.innerHTML += `
                <div class="cartao-box">
                    <div class="verso-layout">
                        <div class="drink-side-left"></div>
                        
                        <div class="verso-center-content">
                           <div class="brand-center">
                                <span class="brand">Nossos Canais</span>
                            </div>
                            </div>
                            
                            <div class="qrs-vertical-box">
                                <div class="qr-row">
                                    <div class="qr-container">
                                        <div id="${qrInstaId}"></div>
                                    </div>
                                    <div class="qr-label">Siga no Insta<span>@_gil.vibe</span></div>
                                </div>
                                <div class="qr-row">
                                    <div class="qr-container">
                                        <div id="${qrAppId}"></div>
                                    </div>
                                    <div class="qr-label">Menu & Orçamento<span>Simulação Online</span></div>
                                </div>
                            </div>
                            
                            <div class="footer-contact">
                                Solicite seu orçamento: <span>(75) 99864-9927</span>
                            </div>
                        </div>
                        
                        <div class="drink-side-right"></div>
                    </div>
                </div>
            `;
        }

        // Renderização limpa e com excelente taxa de leitura dos QR Codes empilhados
        window.onload = function() {
            for (let i = 1; i <= TOTAL_CARTOES; i++) {
                // QR Code 1: Instagram
                new QRCode(document.getElementById(`qr-insta-${i}`), {
                    text: INSTA_URL,
                    width: 38,
                    height: 38,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.M
                });

                // QR Code 2: Web App de Orçamentos
                new QRCode(document.getElementById(`qr-app-${i}`), {
                    text: APP_URL,
                    width: 38,
                    height: 38,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.M
                });
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Impressão Corrigida (8x5cm) - Cartões Gil Eventos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --gold-light: #FFF5D0;
            --gold-main: #FFAE00;
            --gold-dark: #B8860B;
            --dark-bg: #050505;
            --card-w: 8.0cm;
            --card-h: 5.0cm;
        }

        body { 
            margin: 0; 
            padding: 0; 
            background: #222; 
            font-family: 'Poppins', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        .no-print-bar {
            background: #111;
            padding: 15px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            position: sticky;
            top: 0;
            z-index: 999;
        }
        .btn-print {
            background: linear-gradient(45deg, var(--gold-main), #FFD580);
            color: #000;
            border: none;
            padding: 10px 35px;
            font-size: 1em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 174, 0, 0.4);
            text-transform: uppercase;
        }

        .print-section-title {
            color: #fff;
            margin: 25px 0 8px 0;
            text-transform: uppercase;
            font-size: 1.1em;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .folha-a4 {
            width: 21cm;
            height: 29.7cm;
            background: #fff;
            box-sizing: border-box;
            padding: 1.2cm 1.0cm;
            display: grid;
            grid-template-columns: repeat(2, var(--card-w));
            grid-template-rows: repeat(5, var(--card-h));
            gap: 0.5cm 1.0cm;
            justify-content: center;
            align-content: center;
            page-break-after: always;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        .cartao-box {
            width: var(--card-w);
            height: var(--card-h);
            background: var(--dark-bg);
            border-radius: 8px;
            box-sizing: border-box;
            border: 1px solid #222;
            position: relative;
            overflow: hidden;
            display: flex;
        }

        /* FRENTE: Fúria Rubi */
        .frente-layout {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            position: relative;
        }
        .drink-furia {
            width: 45%;
            height: 100%;
            background-image: url('https://i.pinimg.com/736x/68/4b/63/684b638accaa4a1e83ed8c62ab81ca88.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .drink-furia::after {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0; width: 45%;
            background: linear-gradient(to right, transparent, var(--dark-bg));
        }
        .frente-text-side {
            width: 55%;
            padding: 12px 10px 12px 5px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: left;
            z-index: 2;
        }
        .frente-title {
            font-size: 0.85em;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            line-height: 1.2;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .frente-title span {
            color: var(--gold-main);
        }
        .frente-subtitle {
            font-size: 0.52em;
            color: #ddd;
            line-height: 1.3;
            font-weight: 400;
        }

        /* VERSO: Drink Uva + Espaço Duplo QR Code */
        .verso-layout {
            width: 100%;
            height: 100%;
            display: flex;
            position: relative;
            background: #050505;
        }
        .drink-uva {
            width: 35%;
            height: 100%;
            background-image: url('image_43ae27.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .drink-uva::after {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0; width: 50%;
            background: linear-gradient(to right, transparent, #050505);
        }
        .verso-content-side {
            width: 65%;
            padding: 8px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 2;
        }
        .brand-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 3px;
        }
        .brand-header .brand-text {
            display: flex;
            flex-direction: column;
        }
        .brand-header .brand {
            font-size: 0.52em;
            color: #fff;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 300;
            margin: 0;
        }
        .brand-header .handle {
            font-size: 0.62em;
            color: var(--gold-main);
            font-weight: 600;
            margin: -2px 0 0 0;
        }
        .brand-header .location-tag {
            font-size: 0.45em;
            color: #aaa;
            background: #111;
            padding: 2px 5px;
            border-radius: 3px;
            border: 1px solid #222;
            font-weight: 600;
        }
        
        /* Área dos dois QR Codes Lado a Lado */
        .qrs-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 6px;
            margin: 3px 0;
        }
        .qr-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        .qr-container {
            background: #fff;
            padding: 3px;
            border-radius: 4px;
            border: 1.2px solid var(--gold-main);
            display: inline-block;
        }
        .qr-label {
            color: var(--gold-light);
            font-size: 0.4em;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            margin-top: 2px;
            font-weight: 600;
            text-align: center;
        }

        .footer-contact {
            font-size: 0.48em;
            color: #777;
            text-align: center;
            font-weight: 400;
        }

        @media print {
            @page {
                size: A4 portrait;
                margin: 0;
            }
            body { background: #fff; }
            .no-print-bar, .print-section-title { display: none; }
            .folha-a4 {
                margin: 0;
                box-shadow: none;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>

    <div class="no-print-bar">
        <button class="btn-print" onclick="window.print()">🖨️ Imprimir Cartões (Frente e Verso)</button>
    </div>

    <div class="print-section-title">FOLHA 1: FRENTE (Imprimir primeiro)</div>
    <div class="folha-a4" id="paginaFrente"></div>

    <div class="print-section-title">FOLHA 2: VERSO (Virar o papel e imprimir atrás)</div>
    <div class="folha-a4" id="paginaVerso"></div>

    <script>
        const INSTA_URL = "https://www.instagram.com/_gil.vibe?igsh=YW5vYmtnbmR6NHBy";
        const TOTAL_CARTOES = 10;
        const containerFrente = document.getElementById("paginaFrente");
        const containerVerso = document.getElementById("paginaVerso");

        // Gerador das Frentes com o Fúria Rubi destacado
        for (let i = 1; i <= TOTAL_CARTOES; i++) {
            containerFrente.innerHTML += `
                <div class="cartao-box">
                    <div class="frente-layout">
                        <div class="drink-photo-side"></div>
                        <div class="frente-text-side">
                            <div class="frente-title">Viva a<br>Experiência<br><span>Luxury</span></div>
                            <div class="frente-subtitle">Peça seu drink pelo celular, acompanhe a fila ao vivo e aproveite a festa.</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Gerador dos Versos com o QR Code de Conectividade
        for (let i = 1; i <= TOTAL_CARTOES; i++) {
            const cardId = `qrcode-card-${i}`;
            containerVerso.innerHTML += `
                <div class="cartao-box">
                    <div class="verso-layout">
                        <div class="perfil-side">
                            <div class="brand-header">
                                <span class="brand">Gil Eventos</span>
                                <span class="handle">@_gil.vibe</span>
                            </div>
                            
                            <div class="verso-msg">
                                Curtiu os nossos drinks?<br>
                                Poste uma foto e <strong>marque nosso perfil!</strong>
                            </div>
                            
                            <div class="footer-contact">
                                Contato: (75) 99864-9927
                            </div>
                        </div>
                        
                        <div class="qr-side">
                            <div class="qr-container">
                                <div id="${cardId}"></div>
                            </div>
                            <div class="qr-label">Siga no Insta</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Renderização dos QR codes nas posições certas do verso
        window.onload = function() {
            for (let i = 1; i <= TOTAL_CARTOES; i++) {
                new QRCode(document.getElementById(`qrcode-card-${i}`), {
                    text: INSTA_URL,
                    width: 62,
                    height: 62,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Etiquetas Luxury Interativas - Gil Eventos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { 
            --gold-main: #FFAE00;
            --dark-bg: #050505;
            --red-alert: #FF3B30;
        }
        body { margin: 0; padding: 0; background: #1a1a1a; font-family: 'Poppins', sans-serif; }
        .btn-imprimir {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(90deg, #FF6700, #FF9500); color: white;
            border: none; padding: 12px 30px; font-size: 14px; font-weight: bold;
            border-radius: 50px; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 103, 0, 0.4);
            z-index: 9999; text-transform: uppercase; letter-spacing: 1px;
        }
        .folha-a4 {
            width: 210mm; height: 297mm; padding: 12mm 10mm; margin: 80px auto 20px auto;
            background: white; display: grid; grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: repeat(7, 1fr); box-sizing: border-box;
        }
        .etiqueta {
            background: radial-gradient(circle at center, #151515 0%, var(--dark-bg) 100%) !important;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 8px; box-sizing: border-box; position: relative; border: 0.5px solid #e0e0e0; 
            overflow: hidden; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important;
        }
        .qrcode-container {
            background: #ffffff !important; padding: 6px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid var(--gold-main); z-index: 2;
            width: 82px; height: 82px; box-sizing: content-box;
            -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important;
        }
        .conteudo-chamada { text-align: center; margin-top: 4px; z-index: 2; width: 92%; }
        .cta-texto { color: #fff !important; font-size: 7.2pt; font-weight: 700; line-height: 1.15; min-height: 24px; }
        .brand-footer {
            color: var(--gold-main) !important; font-size: 5pt; font-weight: 900;
            text-transform: uppercase; letter-spacing: 1.5px; margin-top: 4px;
        }
        @media print {
            body { background: white; }
            .btn-imprimir { display: none; }
            .folha-a4 { margin: 0; padding: 12mm 10mm; page-break-after: always; box-shadow: none; }
            @page { size: A4 portrait; margin: 0; }
        }
    </style>
</head>
<body>

    <button class="btn-imprimir" id="btnImprimir" onclick="window.print()" disabled style="opacity: 0.5; cursor: not-allowed;">⌛ Carregando QR Codes...</button>
    <div class="folha-a4" id="container"></div>

    <script>
        // Definição das CTAs com tags de cor e parâmetros de rastreamento específicos
        const configuracaoEtiquetas = [
            { text: "<span style='color: var(--red-alert); font-weight:900;'>🚨 NÃO ESCANEIE!</span><br>A não ser que queira um spoiler do bar...", ref: "nao_escaneie" },
            { text: "Descubra seu Drink Ideal<br>em <span style='color: var(--gold-main);'>3 segundos 🔮</span>", ref: "drink_ideal" },
            { text: "<span style='color: var(--red-alert);'>Sua próxima rodada</span><br>depende deste código. 🎲", ref: "proxima_rodada" }
        ];

        const container = document.getElementById('container');
        const urlBase = "https://gileventosfsa-gif.github.io/app-gil-eventos/descubra.html";

        for (let i = 0; i < 21; i++) {
            const config = configuracaoEtiquetas[i % configuracaoEtiquetas.length];
            const div = document.createElement('div');
            div.className = 'etiqueta';
            
            div.innerHTML = `
                <div class="qrcode-container" id="qr-${i}"></div>
                <div class="conteudo-chamada">
                    <div class="cta-texto">${config.text}</div>
                    <div class="brand-footer">Gil Eventos Luxury</div>
                </div>
            `;
            container.appendChild(div);

            // Injeção automática da origem no link do QR Code
            const urlFinal = `${urlBase}?origem=${config.ref}`;

            new QRCode(document.getElementById(`qr-${i}`), {
                text: urlFinal,
                width: 82,
                height: 82,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.M
            });
        }

        // Ativa o botão de impressão apenas após a renderização completa dos componentes
        window.addEventListener("load", () => {
            const btn = document.getElementById("btnImprimir");
            btn.disabled = false;
            btn.style.opacity = "1";
            btn.style.cursor = "pointer";
            btn.innerHTML = "🖨️ Imprimir Cartões Interativos";
        });
    </script>
</body>
</html>

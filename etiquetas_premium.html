<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Etiquetas Retangulares - Gil Eventos Luxury</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold-main: #FFAE00;
            --dark-bg: #050505;
            --border-color: #333;
        }

        body { margin: 0; padding: 0; background: #222; font-family: 'Poppins', sans-serif; }

        /* Configuração da Folha A4 */
        .folha-a4 {
            width: 210mm;
            height: 297mm;
            padding: 10mm;
            margin: 20px auto;
            background: white;
            display: grid;
            /* 4 colunas iguais */
            grid-template-columns: repeat(4, 1fr); 
            /* 10 linhas */
            grid-template-rows: repeat(10, 1fr);
            gap: 2mm; 
            box-sizing: border-box;
        }

        /* Design da Etiqueta Retangular */
        .etiqueta {
            border: 1px solid var(--border-color); /* Linha fina para guiar o corte */
            background: var(--dark-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 5px;
            box-sizing: border-box;
            position: relative;
            /* Borda lateral dourada para charme extra */
            border-left: 4px solid var(--gold-main);
        }

        .frase {
            color: white;
            font-weight: 600;
            font-size: 8pt; /* Ajustado para caber no retângulo */
            text-transform: uppercase;
            line-height: 1.1;
            margin-bottom: 3px;
        }

        .brand-footer {
            color: var(--gold-main);
            font-size: 5pt;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .btn-print {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 30px;
            background: var(--gold-main);
            color: black;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1000;
        }

        @media print {
            body { background: none; }
            .folha-a4 { margin: 0; border: none; }
            .btn-print { display: none; }
            .etiqueta { border: 0.1pt solid #eee; } /* Linha quase invisível na impressão */
            @page { size: A4; margin: 0; }
        }
    </style>
</head>
<body>

    <button class="btn-print" onclick="window.print()">IMPRIMIR 40 ETIQUETAS (A4)</button>

    <div class="folha-a4" id="container">
        </div>

    <script>
        const frasesBase = [
            "Quem tem limite é cartão de crédito.",
            "Tomei juízo, mas não bateu.",
            "Relaxa, o mundo dá vodkas!",
            "Na falta de amor, mais um drink!",
            "Não tenho problema com bebida!",
            "Hoje só termina amanhã!",
            "Não faça drama, me faça um drink!",
            "Remédio: Paracetaloka!",
            "Nunca fiz amigos bebendo leite.",
            "Alguém viu o balde que eu chutei?",
            "Nada como um drink após o outro.",
            "Se não me lembro, não fiz!",
            "Hoje é o dia da maldade!",
            "Melhor que 1 drink, só 2!",
            "Só vim pela bebida!"
        ];

        const container = document.getElementById('container');

        // Gerar 40 etiquetas repetindo as frases da lista
        for (let i = 0; i < 40; i++) {
            const fraseSorteada = frasesBase[i % frasesBase.length];
            const div = document.createElement('div');
            div.className = 'etiqueta';
            div.innerHTML = `
                <div class="frase">${fraseSorteada}</div>
                <div class="brand-footer">GIL EVENTOS</div>
            `;
            container.appendChild(div);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Etiquetas Luxury - Gil Eventos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { 
            --gold-main: #FFAE00;
            --gold-light: #FFF5D0;
            --gold-dark: #B8860B;
            --dark-bg: #050505;
        }

        body { margin: 0; padding: 0; background: #1a1a1a; font-family: 'Poppins', sans-serif; }

        .folha-a4 {
            width: 210mm;
            height: 297mm;
            padding: 12mm 10mm;
            margin: 20px auto;
            background: white;
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: repeat(7, 1fr);
            gap: 4mm;
            box-sizing: border-box;
        }

        .etiqueta {
            background: radial-gradient(circle at center, #151515 0%, var(--dark-bg) 100%);
            border-radius: 6px; 
            display: flex;
            flex-direction: row; 
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
            position: relative;
            border: 1px solid rgba(184, 134, 11, 0.4); 
            overflow: hidden;
        }

        .qrcode-container {
            background: #ffffff;
            padding: 4px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--gold-main);
            z-index: 2;
        }

        .conteudo-texto {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 62%;
            text-align: center;
            z-index: 2;
        }

        .frase {
            color: var(--gold-light);
            font-size: 7.5pt;
            font-weight: 300;
            line-height: 1.3;
            margin-bottom: 5px;
            word-wrap: break-word;
        }

        .brand-footer {
            color: var(--gold-main);
            font-size: 6pt;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @media print {
            body { background: white; }
            .folha-a4 { margin: 0; page-break-after: always; box-shadow: none; }
            @page { size: A4 portrait; margin: 0; }
        }
    </style>
</head>
<body>

    <div class="folha-a4" id="container"></div>

    <script>
        const frasesBase = [
            "Quem tem limite é cartão de crédito.",
            "Tomei juízo, mas não bateu.",
            "Relaxa, o mundo dá vodkas!",
            "Na falta de amor, +1 drink!",
            "Não tenho problema com bebida!",
            "Hoje só termina amanhã!",
            "Não faça drama, me faça um drink!",
            "Remédio: Paracetaloka!",
            "Nunca fiz amigos bebendo leite.",
            "Alguém viu o balde que eu chutei?",
            "Nada como um drink após o outro.",
            "Se não me lembro, não fiz!",
            "Hoje é o dia da maldade!",
            "Melhor que 1 drink, só 2!",
            "Só vim pela bebida!"
        ];

        const container = document.getElementById('container');
        const urlAlvo = "https://nucleoinsight.github.io/eterno-amor-prod/h.html?id=gabriel-beatriz";

        for (let i = 0; i < 21; i++) {
            const fraseSorteada = frasesBase[i % frasesBase.length];
            const div = document.createElement('div');
            div.className = 'etiqueta';
            
            div.innerHTML = `
                <div style="display: flex; flex-direction: column; align-items: center; width: 33%;">
                    <div class="qrcode-container" id="qr-${i}"></div>
                    <div style="color: var(--gold-main); font-size: 3.8pt; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; margin-top: 4px; text-align: center; line-height: 1.1;">
                        Escaneie-me<br><span style="color: #fff; font-size: 3.2pt;">❤️ Histórias</span>
                    </div>
                </div>
                <div class="conteudo-texto">
                    <div class="frase">${fraseSorteada}</div>
                    <div class="brand-footer">Gil Eventos</div>
                </div>
            `;
            
            container.appendChild(div);

            // Geração otimizada: nível M limpa a densidade de pontos e acelera a leitura da câmera
            new QRCode(document.getElementById(`qr-${i}`), {
                text: urlAlvo,
                width: 55,
                height: 55,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.M
            });
        }
    </script>
</body>
</html>
